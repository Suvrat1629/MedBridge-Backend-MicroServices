services:
  mongodb:
    image: mongo:7
    container_name: medbridge-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    volumes:
      - mongo-data:/data/db
    networks:
      - medbridge-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: medbridge-keycloak
    command: start-dev --import-realm
    ports:
      - "8083:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    networks:
      - medbridge-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: medbridge-zipkin
    ports:
      - "9411:9411"
    environment:
      - STORAGE_TYPE=mem
    networks:
      - medbridge-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9411/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  eureka:
    build:
      context: ./eureka
    container_name: medbridge-eureka
    ports:
      - "8761:8761"
    networks:
      - medbridge-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8761/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api-gateway:
    build:
      context: ./api-gateway
    container_name: medbridge-api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://eureka:8761
      KEYCLOAK_URL: http://keycloak:8080
      ZIPKIN_URL: http://zipkin:9411
    depends_on:
      eureka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - medbridge-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  fhir-service:
    build:
      context: ./fhir-service
    container_name: medbridge-fhir-service
    ports:
      - "8085:8083"
    environment:
      EUREKA_URL: http://eureka:8761
      ZIPKIN_URL: http://zipkin:9411
    depends_on:
      eureka:
        condition: service_healthy
    networks:
      - medbridge-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  terminology-service:
    build:
      context: ./terminology-service
    container_name: medbridge-terminology-service
    ports:
      - "8082:8082"
    environment:
      EUREKA_URL: http://eureka:8761
      MONGO_URI: mongodb://root:rootpassword@mongodb:27017/terminology?authSource=admin
      ZIPKIN_URL: http://zipkin:9411
    depends_on:
      eureka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - medbridge-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  medbridge-net:
    driver: bridge

volumes:
  mongo-data:
